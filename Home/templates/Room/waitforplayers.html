<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Waiting Room</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            color: #333;
            padding: 30px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #222;
        }

        ul {
            list-style: none;
            padding-left: 0;
        }

        li {
            background-color: #f0f0f0;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Players in Room</h2>
        <ul id="playerList"></ul>
    </div>

    <script>
        const roomId = localStorage.getItem("room_id");
        const username = localStorage.getItem("username");
        const password = sessionStorage.getItem("password");

        let socket;  // 🔧 Declare at top scope

        if (!roomId || !username || !password) {
            alert("Please Login to continue!");
        } else {
            const protocol = window.location.protocol === "https:" ? "wss" : "ws";
            socket = new WebSocket(
                `${protocol}://${window.location.host}/ws/wait/${roomId}/?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
            );

            const ul = document.getElementById("playerList");

            const updatePlayerList = (players) => {
                ul.innerHTML = "";
                players.forEach(player => {
                    console.log('player', player);
                    const li = document.createElement("li");
                    li.textContent = player;
                    ul.appendChild(li);
                });
            };

            socket.onopen = () => {
                console.log("WebSocket connected.");
            };

            socket.onmessage = function (event) {
                const data = JSON.parse(event.data);
                console.log("Received:", data);

                if (data.type === "players_update" && Array.isArray(data.players)) {
                    updatePlayerList(data.players);
                }
            };

            socket.onerror = function (error) {
                console.error("WebSocket error:", error);
            };

            socket.onclose = function (event) {
                console.log("WebSocket closed:", event.code, event.reason);
            };
        }

        window.addEventListener("beforeunload", function () {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.close();  // ✅ safe close
            }
        });
    </script>

</body>

</html>
