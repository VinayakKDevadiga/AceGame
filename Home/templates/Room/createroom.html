{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    {% if not debug %}
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-85PG4VK6WJ"></script>
        <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-85PG4VK6WJ');
        </script>
    {% endif %}

    <meta charset="UTF-8">
    <title>Create Room</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'room/create_room.css' %}">

</head>

<body>
    <div class="container">
        <h2>Create Room</h2>

        <div id="message" style="color: red;"></div>

        <form id="createRoomForm">
            {% csrf_token %}

            <label>Room ID:</label>
            <div class="field-group">
                <input type="text" value="{{ room_id }}" readonly id="roomID">
                <button type="button" onclick="copyToClipboard(this)">Copy</button>
            </div>

            <label>Password:</label>
            <div class="field-group">
                <input type="text" id="passwordField" value="{{ password }}" readonly>
                <button type="button" onclick="enableEdit()">Edit</button>
            </div>

            <button type="submit">Next</button>
        </form>
    </div>

    <script>
        function copyToClipboard(btn) {
            const roomID = document.getElementById("roomID");
            navigator.clipboard.writeText(roomID.value).then(() => {
                btn.classList.add("copied");
                btn.innerText = "Copied!";
                setTimeout(() => {
                    btn.classList.remove("copied");
                    btn.innerText = "Copy";
                }, 1500);
            });
        }

        function enableEdit() {
            const passwordField = document.getElementById("passwordField");
            passwordField.removeAttribute("readonly");
            passwordField.focus();
        }

        function getCookie(name) {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const [key, value] = cookie.trim().split('=');
                if (key === name) {
                    return decodeURIComponent(value);
                }
            }
            return null;
        }

        document.getElementById("createRoomForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const roomID = document.getElementById("roomID").value;
            const password = document.getElementById("passwordField").value;
            const jwtToken = getCookie("jwt");

            try {
                const response = await fetch("{% url 'createroom' %}", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": getCookie("csrftoken"),
                        "Authorization": `Bearer ${jwtToken}`
                    },
                    body: JSON.stringify({ room_id: roomID, password: password }),
                    credentials: "include"
                });

                if (response.ok) {
                    sessionStorage.setItem("room_id", roomID);
                    sessionStorage.setItem("password", password);
                    window.location.href = "{% url 'waitforplayers' %}";
                } else {
                    const result = await response.json();
                    document.getElementById("message").innerText = result.detail || "Failed to create room.";
                }
            } catch (error) {
                console.error("Request error:", error);
                document.getElementById("message").innerText = "Failed to create room.";
            }
        });
    </script>
</body>

</html>
