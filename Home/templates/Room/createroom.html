<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Create Room</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            color: #333;
            padding: 30px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #222;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin: 10px 0 5px;
            font-weight: bold;
        }

        .field-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            width: 100%;
        }

        input[readonly] {
            background-color: #f0f0f0;
            color: #666;
        }

        button {
            padding: 10px 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            flex-shrink: 0;
        }

        button:hover {
            background-color: #2980b9;
        }

        .copied {
            background-color: #2ecc71 !important;
        }

        ul {
            padding-left: 20px;
            color: green;
        }

        @media screen and (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }

            button {
                font-size: 14px;
                padding: 8px;
            }

            input[type="text"] {
                font-size: 15px;
            }

            .field-group {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Create Room</h2>

        {% if messages %}
        <ul>
            {% for message in messages %}
            <li>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <label>Room ID:</label>
            <div class="field-group">
                <input type="text" value="{{ room_id }}" readonly id="roomID">
                <button type="button" onclick="copyToClipboard(this)">Copy</button>
            </div>

            <label>Password:</label>
            <div class="field-group">
                <input type="text" name="password" id="passwordField" value="{{ password }}" readonly>
                <button type="button" onclick="enableEdit()">Edit</button>
            </div>

            <button type="submit">Next</button>
        </form>
    </div>

    <script>
        function copyToClipboard(btn) {
            const roomID = document.getElementById("roomID");
            navigator.clipboard.writeText(roomID.value).then(() => {
                btn.classList.add("copied");
                btn.innerText = "Copied!";
                setTimeout(() => {
                    btn.classList.remove("copied");
                    btn.innerText = "Copy";
                }, 1500);
            });
        }

        function enableEdit() {
            const passwordField = document.getElementById("passwordField");
            passwordField.removeAttribute("readonly");
            passwordField.focus();
        }
    </script>
</body>

</html>
