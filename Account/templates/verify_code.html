{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Code</title>
    <link rel="stylesheet" href="{% static 'password_reset/verify_code.css' %}">
</head>

<body>
    <div class="container">
        <h1>Verify Code</h1>
        <form method="post">
            {% csrf_token %}
            <label for="code">Enter 4-digit code:</label>
            <input type="text" name="code" id="code" placeholder="1234" maxlength="4" required>
            <button type="submit">Verify Code</button>
        </form>
    </div>
</body>

</html>
